name: 🚀 Production Deploy

on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v2
      with:
        fetch-depth: 2
        ref: main

    - name: 🔨 Build Project
      run: |
        npm install
        npm run build

    - name: 🚀 SFTP Upload
      uses: Dylan700/sftp-upload-action@v1.2.3
      with:
        server: ${{ secrets.PROD_FTP_HOST }}
        username: ${{ secrets.PROD_FTP_USER }}
        password: ${{ secrets.PROD_FTP_PASSWORD }}
        port: 22
        uploads: |
          ./ => ./
        ignore: |
          .git
          node_modules
          src/images
